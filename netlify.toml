[build]
  command = "echo $PATH && ls -la /usr/bin && pnpm install && pnpm exec postcss style.css -o dist/style.min.css && pnpm run build"
  publish = "dist"

[build.environment]
  PATH = "/usr/bin:/bin:/usr/local/bin:$PATH"
  NODE_VERSION = "20"
  PNPM_HOME = ".pnpm"
  NETLIFY_USE_YARN = "false"

[functions]
  node_bundler = "esbuild"
  included_files = [
    "src/**/*.js",
    "src/**/*.ts",
    "src/**/*.json",
    "config/**/*",
    "*.html",
    "*.css"
  ]
  external_node_modules = ["node-fetch", "lodash", "dotenv"]

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = true
