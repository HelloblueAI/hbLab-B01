[build]
  command = "pnpm install && pnpm run build"
  publish = "dist"
  functions = "functions"

[build.environment]
  NODE_VERSION = "20" # Set to the latest LTS version of Node.js
  PNPM_HOME = ".pnpm" # Ensure pnpm environment is available globally
  NETLIFY_USE_YARN = "false" # Explicitly disable yarn if pnpm is preferred

[functions]
  node_bundler = "esbuild" # Efficient bundler for serverless functions
  included_files = [
    "src/**/*.js",
    "src/**/*.ts",
    "src/**/*.json",
    "config/**/*",
    "*.html",
    "*.css"
  ]
  external_node_modules = ["node-fetch", "lodash", "dotenv"] # Ensure required modules are bundled

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = true # Ensure the redirect is enforced, ignoring other routes

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate" # Optimize for SPA caching
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable" # Cache static assets aggressively

[context.production]
  [context.production.environment]
    NODE_ENV = "production"
    API_BASE_URL = "https://api.yourproductionurl.com"
    ENABLE_LOGGING = "false" # Disable logging in production
    ANALYTICS_KEY = "your-production-analytics-key"

[context.deploy-preview]
  [context.deploy-preview.environment]
    NODE_ENV = "development"
    API_BASE_URL = "https://api.yourpreviewurl.com"
    ENABLE_LOGGING = "true" # Enable logging for preview builds
    ANALYTICS_KEY = "your-preview-analytics-key"

[context.branch-deploy]
  [context.branch-deploy.environment]
    NODE_ENV = "staging"
    API_BASE_URL = "https://api.yourstagingurl.com"
    ENABLE_LOGGING = "true" # Enable logging for branch deployments
    ANALYTICS_KEY = "your-staging-analytics-key"

[context.local]
  [context.local.environment]
    NODE_ENV = "development"
    API_BASE_URL = "http://localhost:3000"
    ENABLE_LOGGING = "true"
