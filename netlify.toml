[build]
  # Clear npm cache, install dependencies, and build the project
  command = "npm cache clean --force && npm install && npm run build"
  publish = "dist"
  functions = "functions"

  # Set environment variables for Node.js version and deployment
  environment = { NODE_VERSION = "20", NPM_VERSION = "10.8.2" }

[[redirects]]
  from = "/redirect.php"
  to = "/.netlify/functions/redirect"
  status = 301
  force = true
