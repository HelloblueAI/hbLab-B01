[build]
  command = "pnpm run build"
  publish = "dist"
  functions = "functions"

[build.environment]
  NODE_VERSION = "20" # Set to the latest LTS version of Node.js

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["node-fetch"]
  included_files = ["src/**/*.js", "src/**/*.ts"]

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[context.production]
  [context.production.environment]
    NODE_ENV = "production"
    API_BASE_URL = "https://api.yourproductionurl.com"

[context.deploy-preview]
  [context.deploy-preview.environment]
    NODE_ENV = "development"
    API_BASE_URL = "https://api.yourpreviewurl.com"


[context.branch-deploy]
  [context.branch-deploy.environment]
    NODE_ENV = "staging"
    API_BASE_URL = "https://api.yourstagingurl.com"
    
