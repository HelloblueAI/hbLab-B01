[build]
  command = "echo $PATH && ls -la /usr/bin && pnpm install && pnpm exec postcss style.css -o dist/style.min.css && pnpm run build"
  publish = "dist"

[build.environment]
  PATH = "/usr/bin:/bin:/usr/local/bin:$PATH"
  NODE_VERSION = "20"  # Use the latest LTS version for compatibility
  PNPM_HOME = ".pnpm"  # Ensure pnpm environment is globally accessible
  NETLIFY_USE_YARN = "false"  # Explicitly disable Yarn
  PYTHON_VERSION = "3.9"  # Specify Python version for potential dependency needs
  CI = "true"  # Enable Continuous Integration optimizations

[functions]
  node_bundler = "esbuild"  # Use esbuild for faster, efficient bundling
  included_files = [
    "src/**/*.js",
    "src/**/*.ts",
    "src/**/*.json",
    "config/**/*",
    "*.html",
    "*.css"
  ]
  external_node_modules = ["node-fetch", "lodash", "dotenv"]  # Explicitly include required external modules
  node_version = "20"  # Ensure functions use the same Node.js version as the build

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = true  # Enforce redirect for SPA behavior

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"  # Set SPA cache policy
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"  # Cache static assets aggressively

[context.production]
  [context.production.environment]
    NODE_ENV = "production"
    API_BASE_URL = "https://api.productionurl.com"
    ENABLE_LOGGING = "false"  # Disable verbose logging in production
    ANALYTICS_KEY = "prod-analytics-key"

[context.deploy-preview]
  [context.deploy-preview.environment]
    NODE_ENV = "development"
    API_BASE_URL = "https://api.previewurl.com"
    ENABLE_LOGGING = "true"  # Enable detailed logging for preview builds
    ANALYTICS_KEY = "preview-analytics-key"

[context.branch-deploy]
  [context.branch-deploy.environment]
    NODE_ENV = "staging"
    API_BASE_URL = "https://api.stagingurl.com"
    ENABLE_LOGGING = "true"  # Enable logging for staging environments
    ANALYTICS_KEY = "staging-analytics-key"

[context.local]
  [context.local.environment]
    NODE_ENV = "development"
    API_BASE_URL = "http://localhost:3000"
    ENABLE_LOGGING = "true"  # Enable verbose logging for local development
